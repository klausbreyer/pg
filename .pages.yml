media:
  input: media
  output: /media

actions:
  - name: validate-content
    label: Inhalte pruefen
    workflow: pages-cms-action.yml
    ref: current
  - name: deploy-site
    label: Site deployen
    workflow: deploy-pages.yml
    ref: current

content:
  - name: pages
    label: Seiten
    type: collection
    path: docs
    exclude:
      - _config.yml
      - _layouts/**
      - assets/**
      - media/**
    format: yaml-frontmatter
    filename: "{primary}.md"
    fields:
      - name: title
        label: Titel
        type: string
        required: true
      - name: description
        label: Beschreibung
        type: text
      - name: body
        label: Inhalt
        type: rich-text
    view:
      primary: title
      fields:
        - title
        - description
