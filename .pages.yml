media:
  input: media
  output: /media

content:
  - name: pages
    label: Seiten
    type: collection
    path: docs
    format: yaml-frontmatter
    filename: "{primary}.md"
    fields:
      - name: title
        label: Titel
        type: string
        required: true
      - name: description
        label: Beschreibung
        type: text
      - name: body
        label: Inhalt
        type: rich-text
    view:
      primary: title
      fields:
        - title
        - description
