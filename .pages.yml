media:
  input: media
  output: /media

actions:
  - name: validate-content
    label: Inhalte pruefen
    workflow: pages-cms-action.yml
    ref: current
  - name: deploy-site
    label: Site deployen
    workflow: deploy-pages.yml
    ref: current

content:
  - name: pages
    label: Seiten
    type: collection
    path: docs
    format: yaml-frontmatter
    filename: "{primary}.md"
    fields:
      - name: title
        label: Titel
        type: string
        required: true
      - name: description
        label: Beschreibung
        type: text
      - name: sections
        label: Sektionen
        type: block
        list:
          collapsible:
            collapsed: true
            summary: "{title}"
        blocks:
          - name: hero
            label: Hero
            fields:
              - name: title
                label: Titel
                type: string
                required: true
              - name: text
                label: Text
                type: text
              - name: image
                label: Bild
                type: image
          - name: text
            label: Textblock
            fields:
              - name: title
                label: Titel
                type: string
                required: true
              - name: body
                label: Inhalt
                type: rich-text
          - name: image
            label: Bildblock
            fields:
              - name: title
                label: Titel
                type: string
              - name: image
                label: Bild
                type: image
                required: true
              - name: caption
                label: Bildunterschrift
                type: text
          - name: cta
            label: Call to Action
            fields:
              - name: title
                label: Titel
                type: string
                required: true
              - name: text
                label: Text
                type: text
              - name: url
                label: Link
                type: string
              - name: button
                label: Button Text
                type: string
      - name: body
        label: Inhalt
        type: rich-text
    view:
      primary: title
      fields:
        - title
        - description
