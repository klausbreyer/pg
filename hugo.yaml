baseURL: https://klausbreyer.github.io/pg/
locale: de-DE
title: pg
params:
  description: Pages CMS Projekt fuer GitHub.
disableKinds:
  - taxonomy
  - term

module:
  mounts:
    - source: docs
      target: content
    - source: static
      target: static
    - source: media
      target: static/media

caches:
  images:
    dir: :cacheDir/images

markup:
  goldmark:
    renderer:
      unsafe: false
